<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Department Assistant</title>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color-scheme: light dark;
      }
      body {
        margin: 0;
        display: flex;
        justify-content: center;
        background: #f4f5f7;
      }
      #app {
        width: 100%;
        max-width: 720px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: #fff;
        box-shadow: 0 0 24px rgba(0, 0, 0, 0.08);
      }
      header {
        padding: 12px 16px;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      header h1 {
        font-size: 16px;
        margin: 0;
      }
      #badge {
        font-size: 12px;
        padding: 2px 8px;
        border-radius: 12px;
        background: #e0e7ff;
        color: #3730a3;
      }
      #override {
        font-size: 12px;
      }
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .msg {
        max-width: 80%;
        padding: 8px 12px;
        border-radius: 12px;
        line-height: 1.4;
        font-size: 14px;
        white-space: pre-wrap;
      }
      .msg.user {
        align-self: flex-end;
        background: #4f46e5;
        color: #fff;
      }
      .msg.assistant {
        align-self: flex-start;
        background: #f1f2f6;
        color: #111827;
      }
      .msg.ticket {
        align-self: flex-start;
        background: #ecfdf5;
        color: #065f46;
        border: 1px solid #a7f3d0;
        font-size: 13px;
      }
      form {
        display: flex;
        gap: 8px;
        padding: 12px 16px;
        border-top: 1px solid #e5e7eb;
      }
      input[type="text"] {
        flex: 1;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        font-size: 14px;
      }
      button {
        padding: 10px 16px;
        border-radius: 8px;
        border: none;
        background: #4f46e5;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Employee Assistant</h1>
        <div style="display: flex; align-items: center; gap: 8px;">
          <span id="badge">select a department</span>
          <select id="department">
            <option value="">Choose department...</option>
            <option value="hr">HR</option>
            <option value="payroll">Payroll</option>
            <option value="it-support">IT Support</option>
          </select>
        </div>
      </header>
      <div id="messages"></div>
      <form id="form">
        <input id="input" type="text" placeholder="Ask about HR, payroll, or IT..." autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
