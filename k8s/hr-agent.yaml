apiVersion: apps/v1
kind: Deployment
metadata:
  name: hr-agent
  namespace: department-assistant
  labels:
    app: hr-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hr-agent
  template:
    metadata:
      labels:
        app: hr-agent
    spec:
      containers:
        - name: hr-agent
          image: hr-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: LLM_BASE_URL
              value: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/llm/gemini
            - name: MCP_SERVER_URL
              value: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/mcp/hr
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: hr-agent
  namespace: department-assistant
spec:
  selector:
    app: hr-agent
  ports:
    - name: http
      port: 80
      targetPort: http
