apiVersion: apps/v1
kind: Deployment
metadata:
  name: hr-mcp
  namespace: department-assistant
  labels:
    app: hr-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hr-mcp
  template:
    metadata:
      labels:
        app: hr-mcp
    spec:
      containers:
        - name: hr-mcp
          image: hr-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: hr-mcp
  namespace: department-assistant
spec:
  selector:
    app: hr-mcp
  ports:
    - name: http
      port: 80
      targetPort: http
