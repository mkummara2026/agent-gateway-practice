apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: it-support-mcp-backend
  namespace: department-assistant
spec:
  mcp:
    targets:
      - name: it-support-tickets
        static:
          backendRef:
            name: it-support-mcp
          port: 80
          protocol: StreamableHTTP
          path: /mcp
